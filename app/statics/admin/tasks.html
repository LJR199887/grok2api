<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="tasks.pageTitle">Grok2API - Task List</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body{background:#FAF9F5}
    .page{width:min(1180px,calc(100vw - 40px));margin:0 auto;padding:34px 0 70px}
    .page-hd{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:24px}
    .page-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
    .page-sub{margin-top:5px;font-size:13px;color:var(--fg-muted)}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:#fff;border:1px solid #eee;border-radius:16px;padding:18px;box-shadow:0 8px 26px rgba(20,20,20,.04)}
    .stat-value{font:700 28px/1 "Geist Mono",monospace;letter-spacing:-.03em}
    .stat-label{margin-top:7px;font-size:12px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.04em}
    .summary-tools{display:flex;justify-content:flex-end;margin:-6px 0 12px}
    .panel{background:rgba(255,255,255,.82);border:1px solid #ededed;border-radius:18px;box-shadow:0 16px 44px rgba(20,20,20,.05);overflow:hidden}
    .toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid #eee}
    .filters{display:flex;flex-wrap:wrap;gap:12px 18px}
    .filter-group{display:flex;align-items:center;gap:8px}
    .filter-label{font-size:12px;font-weight:600;color:var(--fg-muted)}
    .chip-row{display:flex;gap:5px;padding:4px;border-radius:999px;background:#f4f0e8}
    .chip{height:28px;padding:0 12px;border-radius:999px;font-size:12px;font-weight:600;color:#6d675d}
    .chip.active{background:#fff;color:#111;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .refresh-btn{height:34px;padding:0 14px;border-radius:999px;background:#111;color:#fff;font-size:13px;font-weight:700}
    .refresh-btn:disabled{opacity:.55;cursor:not-allowed}
    .hidden{display:none!important}
    .table-wrap{overflow-x:auto}
    table{width:100%;min-width:980px;border-collapse:collapse}
    th,td{padding:14px 16px;border-bottom:1px solid #f0f0f0;text-align:left;font-size:13px}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#777;background:#fbfaf7}
    tbody tr:hover td{background:#fffdf8}
    .mono{font-family:"Geist Mono",monospace}
    .badge{display:inline-flex;align-items:center;justify-content:center;height:26px;padding:0 10px;border-radius:8px;font-size:12px;font-weight:700}
    .type-image{background:#ecfdf5;color:#059669;border:1px solid #d1fae5}
    .type-video{background:#fdf4ff;color:#c026d3;border:1px solid #fae8ff}
    .status-running{background:#eff6ff;color:#2563eb;border:1px solid #dbeafe}
    .status-success{background:#f0fdf4;color:#16a34a;border:1px solid #dcfce7}
    .status-failure{background:#fef2f2;color:#dc2626;border:1px solid #fee2e2}
    .status-btn{cursor:pointer}
    .link-btn{display:inline-flex;align-items:center;justify-content:center;min-width:64px;height:28px;padding:0 12px;border-radius:999px;background:#ecfdf5;color:#059669;border:1px solid #d1fae5;font-size:12px;font-weight:700}
    .empty{padding:36px;text-align:center;color:var(--fg-muted);font-size:13px}
    dialog{border:0;border-radius:18px;padding:0;width:min(620px,calc(100vw - 32px));box-shadow:0 24px 80px rgba(15,23,42,.18)}
    dialog::backdrop{background:rgba(15,23,42,.28);backdrop-filter:blur(2px)}
    .dialog-body{padding:20px;background:#fff;border-radius:18px}
    .dialog-title{font-size:16px;font-weight:700}
    .failure-log{margin-top:14px;min-height:150px;max-height:360px;overflow:auto;padding:13px;border:1px solid #eee;border-radius:12px;background:#fafafa;white-space:pre-wrap;word-break:break-word;font:12px/1.6 "Geist Mono",monospace;color:#444}
    @media(max-width:720px){.page{width:min(100vw - 24px,1180px);padding-top:24px}.page-hd{align-items:flex-start;flex-direction:column}.toolbar{align-items:flex-start}.filters{flex-direction:column}.summary-tools{justify-content:flex-start}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<div id="admin-header"></div>
<main class="page">
  <div class="page-hd">
    <div>
      <h1 class="page-title" data-i18n="tasks.title">任务列表</h1>
      <p class="page-sub" data-i18n="tasks.subtitle">监控图片和视频生成任务、耗时、失败日志和公开链接。</p>
    </div>
    <button id="refresh-btn" class="refresh-btn" type="button" data-i18n="tasks.manualRefresh">刷新</button>
  </div>

  <section class="summary-grid">
    <div class="summary-tools" style="grid-column:1/-1">
      <div class="filter-group">
        <span class="filter-label" data-i18n="tasks.summaryRange">统计范围</span>
        <div class="chip-row">
          <button class="chip active" data-range-filter="today" type="button" data-i18n="tasks.rangeToday">今日</button>
          <button class="chip" data-range-filter="yesterday" type="button" data-i18n="tasks.rangeYesterday">昨日</button>
          <button class="chip" data-range-filter="last3" type="button" data-i18n="tasks.rangeLast3">近3天</button>
          <button class="chip" data-range-filter="last7" type="button" data-i18n="tasks.rangeLast7">近7天</button>
        </div>
      </div>
    </div>
    <div class="stat-card"><div class="stat-value" id="summary-total">0</div><div class="stat-label" data-i18n="tasks.totalTasks">总任务</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-image-running">0</div><div class="stat-label" data-i18n="tasks.imageRunning">图片进行中</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-image-success">0</div><div class="stat-label" data-i18n="tasks.imageSuccess">图片成功</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-image-failure">0</div><div class="stat-label" data-i18n="tasks.imageFailure">图片失败</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-video-running">0</div><div class="stat-label" data-i18n="tasks.videoRunning">视频进行中</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-video-success">0</div><div class="stat-label" data-i18n="tasks.videoSuccess">视频成功</div></div>
    <div class="stat-card"><div class="stat-value" id="summary-video-failure">0</div><div class="stat-label" data-i18n="tasks.videoFailure">视频失败</div></div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <div class="filters">
        <div class="filter-group">
          <span class="filter-label" data-i18n="tasks.filterType">类型</span>
          <div class="chip-row">
            <button class="chip active" data-filter-type="all" type="button">All</button>
            <button class="chip" data-filter-type="image" type="button" data-i18n="tasks.typeImage">图片</button>
            <button class="chip" data-filter-type="video" type="button" data-i18n="tasks.typeVideo">视频</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label" data-i18n="tasks.filterStatus">状态</span>
          <div class="chip-row">
            <button class="chip active" data-filter-status="all" type="button">All</button>
            <button class="chip" data-filter-status="running" type="button" data-i18n="tasks.statusRunning">进行中</button>
            <button class="chip" data-filter-status="success" type="button" data-i18n="tasks.statusSuccess">成功</button>
            <button class="chip" data-filter-status="failure" type="button" data-i18n="tasks.statusFailure">失败</button>
          </div>
        </div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="tasks.tableType">类型</th>
            <th data-i18n="tasks.tableSource">来源</th>
            <th data-i18n="tasks.tableModel">模型</th>
            <th data-i18n="tasks.tableStatus">状态</th>
            <th data-i18n="tasks.tableStartedAt">开始时间</th>
            <th data-i18n="tasks.tableDuration">耗时/秒</th>
            <th data-i18n="tasks.tableAssetLink">公开链接</th>
            <th data-i18n="tasks.tableEndpoint">接口入口</th>
          </tr>
        </thead>
        <tbody id="task-list-body"></tbody>
      </table>
    </div>
    <div id="task-list-empty" class="empty hidden" data-i18n="tasks.noTasks">暂无匹配任务</div>
  </section>
</main>
<div id="site-footer"></div>

<dialog id="failure-dialog">
  <div class="dialog-body">
    <div class="dialog-title" data-i18n="tasks.failureTitle">失败详情</div>
    <pre id="failure-log" class="failure-log"></pre>
    <div style="display:flex;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-primary" type="button" id="failure-close" data-i18n="tasks.close">关闭</button>
    </div>
  </div>
</dialog>

<script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
let adminToken = '';
let loading = false;
let currentType = 'all';
let currentStatus = 'all';
let currentRange = 'today';
let tasks = [];
let dailyStats = [];

const text = (key, fallback, params) => {
  if (typeof window.t !== 'function') return fallback;
  const value = t(key, params);
  return value === key ? fallback : value;
};
const esc = (value) => String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const byId = (id) => document.getElementById(id);
const waitI18n = () => new Promise((resolve) => window.I18n?.onReady ? I18n.onReady(resolve) : resolve());
const authHeaders = () => adminToken ? { Authorization: `Bearer ${adminToken}` } : {};

function formatTime(ms) {
  if (!ms) return '-';
  return new Date(ms).toLocaleString(undefined, { hour12: false });
}
function formatDuration(ms) {
  return String(Math.max(0, Math.round((ms || 0) / 1000)));
}
function typeLabel(type) {
  return type === 'video' ? text('tasks.typeVideo', '视频') : text('tasks.typeImage', '图片');
}
function statusLabel(status) {
  if (status === 'success') return text('tasks.statusSuccess', '成功');
  if (status === 'failure') return text('tasks.statusFailure', '失败');
  return text('tasks.statusRunning', '进行中');
}
function sourceLabel(source) {
  const map = {
    images_api: text('tasks.sourceImagesApi', 'Images API'),
    videos_api: text('tasks.sourceVideosApi', 'Videos API'),
    chat_completions: text('tasks.sourceChat', 'Chat Completions'),
  };
  return map[source] || source || '-';
}
function emptySummary() {
  return {
    total: 0,
    image: { running: 0, success: 0, failure: 0 },
    video: { running: 0, success: 0, failure: 0 },
  };
}
function summarizeRange(range) {
  const stats = Array.isArray(dailyStats) ? dailyStats : [];
  if (!stats.length) return emptySummary();
  let selected = [];
  if (range === 'yesterday') selected = stats.slice(-2, -1);
  else if (range === 'last3') selected = stats.slice(-3);
  else if (range === 'last7') selected = stats.slice(-7);
  else selected = stats.slice(-1);
  return selected.reduce((acc, item) => {
    acc.total += item.total || 0;
    acc.image.running += item.image?.running || 0;
    acc.image.success += item.image?.success || 0;
    acc.image.failure += item.image?.failure || 0;
    acc.video.running += item.video?.running || 0;
    acc.video.success += item.video?.success || 0;
    acc.video.failure += item.video?.failure || 0;
    return acc;
  }, emptySummary());
}
function resultLink(task) {
  const url = String(task?.result_url || '').trim();
  if (!url) return '<span style="color:#999">-</span>';
  return `<a class="link-btn" href="${esc(url)}" target="_blank" rel="noreferrer noopener" title="${esc(url)}">${esc(text('tasks.openAssetLink','打开'))}</a>`;
}
function filteredTasks() {
  return tasks.filter((task) => {
    const typeOk = currentType === 'all' || task.task_type === currentType;
    const statusOk = currentStatus === 'all' || task.status === currentStatus;
    return typeOk && statusOk;
  });
}
function renderSummary(summary) {
  const image = summary?.image || {};
  const video = summary?.video || {};
  byId('summary-total').textContent = String(summary?.total || 0);
  byId('summary-image-running').textContent = String(image.running || 0);
  byId('summary-image-success').textContent = String(image.success || 0);
  byId('summary-image-failure').textContent = String(image.failure || 0);
  byId('summary-video-running').textContent = String(video.running || 0);
  byId('summary-video-success').textContent = String(video.success || 0);
  byId('summary-video-failure').textContent = String(video.failure || 0);
}
function renderList() {
  const body = byId('task-list-body');
  const empty = byId('task-list-empty');
  const list = filteredTasks();
  if (!list.length) {
    body.innerHTML = '';
    empty.classList.remove('hidden');
    empty.textContent = text('tasks.noTasks', '暂无匹配任务');
    return;
  }
  empty.classList.add('hidden');
  body.innerHTML = list.map((task) => `
    <tr>
      <td><span class="badge type-${task.task_type === 'video' ? 'video' : 'image'}">${esc(typeLabel(task.task_type))}</span></td>
      <td>${esc(sourceLabel(task.source))}</td>
      <td class="mono">${esc(task.model || '-')}</td>
      <td>${task.status === 'failure'
        ? `<button class="badge status-failure status-btn" data-failure-id="${esc(task.task_id || '')}" type="button">${esc(statusLabel(task.status))}</button>`
        : `<span class="badge status-${esc(task.status || 'running')}">${esc(statusLabel(task.status))}</span>`}</td>
      <td class="mono">${esc(formatTime(task.created_at))}</td>
      <td class="mono">${esc(formatDuration(task.duration_ms))}</td>
      <td>${resultLink(task)}</td>
      <td class="mono">${esc(task.endpoint || '-')}</td>
    </tr>
  `).join('');
}
async function loadTasks(showNotice = false) {
  if (loading) return;
  loading = true;
  byId('refresh-btn').disabled = true;
  try {
    const res = await fetch('/admin/api/tasks', { headers: authHeaders(), cache: 'no-store' });
    if (res.status === 401) {
      adminLogout();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    tasks = Array.isArray(payload.task_list) ? payload.task_list : [];
    dailyStats = Array.isArray(payload.daily_stats) ? payload.daily_stats : [];
    renderSummary(summarizeRange(currentRange));
    renderList();
    if (showNotice) showToast(text('tasks.loadSuccess', '已刷新'), 'success');
  } catch (error) {
    showToast(text('tasks.loadFailed', `加载失败: ${error.message}`, { message: error.message }), 'error');
  } finally {
    loading = false;
    byId('refresh-btn').disabled = false;
  }
}
function bindEvents() {
  byId('refresh-btn').addEventListener('click', () => loadTasks(true));
  document.querySelectorAll('[data-filter-type]').forEach((button) => {
    button.addEventListener('click', () => {
      currentType = button.dataset.filterType;
      document.querySelectorAll('[data-filter-type]').forEach((item) => item.classList.toggle('active', item === button));
      renderList();
    });
  });
  document.querySelectorAll('[data-filter-status]').forEach((button) => {
    button.addEventListener('click', () => {
      currentStatus = button.dataset.filterStatus;
      document.querySelectorAll('[data-filter-status]').forEach((item) => item.classList.toggle('active', item === button));
      renderList();
    });
  });
  document.querySelectorAll('[data-range-filter]').forEach((button) => {
    button.addEventListener('click', () => {
      currentRange = button.dataset.rangeFilter || 'today';
      document.querySelectorAll('[data-range-filter]').forEach((item) => item.classList.toggle('active', item === button));
      renderSummary(summarizeRange(currentRange));
    });
  });
  byId('task-list-body').addEventListener('click', (event) => {
    const target = event.target.closest('[data-failure-id]');
    if (!target) return;
    const task = tasks.find((item) => String(item.task_id || '') === String(target.dataset.failureId || ''));
    byId('failure-log').textContent = String(task?.error_message || '').trim() || text('tasks.failureLogEmpty', '暂无失败日志');
    byId('failure-dialog').showModal();
  });
  byId('failure-close').addEventListener('click', () => byId('failure-dialog').close());
}
(async () => {
  await waitI18n();
  await renderAdminHeader?.();
  await renderSiteFooter?.();
  adminToken = await adminKey.get();
  if (!adminToken || !await verifyKey(ADMIN_API + '/verify', adminToken).catch(() => false)) {
    location.href = '/admin/login';
    return;
  }
  bindEvents();
  await loadTasks(false);
})();
</script>
</body>
</html>
